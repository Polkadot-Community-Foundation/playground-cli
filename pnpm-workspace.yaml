# pnpm settings (moved here from package.json#pnpm — pnpm 11 no longer reads
# that field). This is NOT a multi-package workspace; pnpm-workspace.yaml is
# simply where pnpm >= 11 keeps its settings, single-package repos included.

# pnpm 11 renamed onlyBuiltDependencies to an allowBuilds map. Only biome's
# postinstall runs (same as the old onlyBuiltDependencies allowlist); the
# explicit `false` entries were implicitly denied under pnpm 10 and the tree
# works without their build scripts.
allowBuilds:
  "@biomejs/biome": true
  "@parity/product-sdk-terminal": false
  # @parity/polkadot-app-deploy ships a postinstall (`patch-package || true`)
  # bundling an @novasamatech/sdk-statement@0.6.0 patch. We deny it: our own pnpm
  # patch on that exact package (see patchedDependencies below) already applies
  # the fix, so the postinstall is redundant. Keep at false.
  "@parity/polkadot-app-deploy": false
  # Same package under its real (PCF) name once installed via the npm: alias —
  # same rationale, same deny.
  "@polkadot-community-foundation/polkadot-app-deploy": false
  esbuild: false
  node-datachannel: false

minimumReleaseAgeExclude:
  - "@parity/polkadot-app-deploy@0.12.1"
  - "@polkadot-community-foundation/cdm-env@2.2.0"
  - "@parity/polkadot-app-deploy@0.11.0"
  - "@parity/dotns-cli@0.7.2"
  # The @novasamatech/* 0.8.7 family (pulled transitively by
  # @parity/product-sdk-terminal@^0.5.0 → host-papp@^0.8.7) publishes the stable
  # tag the same day; the min-age gate would otherwise pin us to the older
  # 0.8.7-N prerelease line. We opt these onto the stable line explicitly — they
  # come from the vetted triangle-js-sdks source. host-papp pins statement-store
  # exact, so the whole family must move together. Drop these once the version
  # naturally ages past the min-age window.
  - "@novasamatech/host-papp@0.8.7"
  - "@novasamatech/host-api@0.8.7"
  - "@novasamatech/host-api-wrapper@0.8.7"
  - "@novasamatech/statement-store@0.8.7"
  - "@novasamatech/storage-adapter@0.8.7"
  - "@novasamatech/scale@0.8.7"
  - "@novasamatech/substrate-slot-sr25519-wasm@0.8.7"
  - '@parity/cdm-builder@3.1.7'
  - '@parity/cdm-codegen@0.6.20'
  - '@parity/cdm-env@2.0.6'
  - '@parity/product-sdk-chain-client@0.7.4'
  - '@parity/product-sdk-cloud-storage@0.6.4'
  - '@parity/product-sdk-contracts@0.7.7'
  - '@parity/product-sdk-host@0.10.2'
  - '@parity/product-sdk-keys@0.3.10'
  - '@parity/product-sdk-local-storage@0.2.9'
  - '@parity/product-sdk-signer@0.8.1'
  - '@parity/product-sdk-tx@0.2.14'
  - '@polkadot-community-foundation/polkadot-app-deploy@0.12.0'
  - '@polkadot-community-foundation/polkadot-app-deploy@0.12.1'

overrides:
  # dotns-cli ships a broken publish manifest (file:.papi/descriptors missing
  # from the tarball) through every published 0.6.x AND 0.7.2; the version-
  # agnostic `>` prefix keeps this stub applied across bumps. See CLAUDE.md.
  "@parity/dotns-cli>@polkadot-api/descriptors": "file:./stubs/papi-descriptors-stub"
  # Load-bearing: collapses three transitive json-rpc-provider versions onto
  # one to avoid wire-shape divergence. See CLAUDE.md.
  "@polkadot-api/json-rpc-provider": "^0.2.0"
  # Security: force axios >= 1.16.0 to clear a batch of Dependabot advisories
  # (ReDoS, proxy-auth leaks, prototype-pollution gadgets). axios is transitive
  # only through @parity/dotns-cli, which ships a fully bundled dist/cli.js
  # (inlined deps, never resolved at runtime), so this is lockfile hygiene; the
  # advisories are browser/proxy paths that don't apply to the Node CLI anyway.
  # Drop once dotns-cli's own tree carries >= 1.16.0.
  "axios": "^1.16.0"

patchedDependencies:
  # PATCH(playground-cli) — local-only fixes pending upstream. See CLAUDE.md
  # "Two local pnpm patches remain" for what each one does.
  "@novasamatech/statement-store@0.8.7": "patches/@novasamatech__statement-store@0.8.7.patch"
  "@novasamatech/sdk-statement@0.6.0": "patches/@novasamatech__sdk-statement@0.6.0.patch"
